[package]
name = "ktools"
version = "0.1.1"
edition = "2024"
build = "build.rs"

[features]
default = []
nocon = [] # no console window

[profile.release]
lto = true
strip = true
panic = "abort"
codegen-units = 1
opt-level = "z"

[build-dependencies]

[target.x86_64-pc-windows-msvc.build-dependencies]
winres = "0.1.12"
static_vcruntime = "3.0.0"

[dependencies]
iced_aw = "0.14.1"
iced_fonts = { version = "0.3.0", features = ["codicon"] }
image = "0.25.10"
json = "0.12.4"
network-interface = "2.0.5"
rand = "0.10.1"
ureq = "3.3.0"

[dependencies.iced]
version = "0.14.0"
features = ["image"]
