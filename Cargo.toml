[package]
name = "ktools"
version = "0.1.0"
edition = "2024"

[features]
# no console window
default = []
nocon = []

[profile.release]
lto = true
strip = true
codegen-units = 1
opt-level = "z"

[dependencies]
iced_fonts = { version = "0.3.0", features = ["codicon"] }

[dependencies.iced]
version = "0.14.0"
