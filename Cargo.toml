[package]
name = "ktools"
version = "0.1.0"
edition = "2024"
build = "build.rs"

[features]
# no console window
default = []
nocon = []

[profile.release]
lto = true
strip = true
codegen-units = 1
opt-level = "z"

[build-dependencies]

[target.x86_64-pc-windows-msvc.build-dependencies]
winres = "0.1.12"
static_vcruntime = "3.0.0"

[dependencies]
iced_fonts = { version = "0.3.0", features = ["codicon"] }
network-interface = "2.0.5"
rand = "0.10.1"

[dependencies.iced]
version = "0.14.0"
